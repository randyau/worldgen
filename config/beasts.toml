# config/beasts.toml
# Beast species catalog. Loaded alongside sim_config.toml.
# Each [[beasts]] entry is one species.
# category: "predator" = real-world analogue (has normal + legendary variant)
#           "mythological" = always rare, always legendary-quality, no normal herd
# abilities: tags — effects are stubs until Phase 2.2+. See docs/design/beast_design.md DS-E4.

# ─── Global spawn settings ────────────────────────────────────────────────────

[beast_spawn]
target_density_per_10k_tiles = 5      # ~60 beasts on a 120k-tile world
myth_start_fraction          = 0.20   # fraction of mythological creatures present at year 0
myth_emergence_years         = 200    # remaining mythologicals emerge within this many years

[combat]
max_rounds_per_tick          = 8      # rounds before "standoff" ends this tick
max_gang_size                = 3      # max pack members that can attack per round
retreat_health_fraction      = 0.25   # entity flees when health drops below this fraction

