# World Engine — Ancestry Definitions
# Each [[ancestry]] block defines one ancestry.
# Personality bias fields are offsets on the Gaussian mean (base 0.5).
# +0.2 shifts average from 0.5 → 0.7; individual noise (stddev ≈ 0.2) equals max bias,
# keeping individuals more variable than their ancestry stereotype.
# Lifespan is in seasons (4 seasons/year).

# =============================================================================
# HUMAN — baseline; no biases; appears in most biomes
# =============================================================================
[[ancestry]]
id                    = "human"
display_name          = "Human"
min_lifespan_seasons  = 60
max_lifespan_seasons  = 200
spawn_weights         = { grassland = 2.0, plains = 2.0, savanna = 2.0, temperate_forest = 1.5, boreal_forest = 1.0, hills = 1.5, desert = 1.0, tundra = 0.5 }
first_meeting_trust   = { elf = 0.0, dwarf = 0.05, dark_elf = -0.05, orc = -0.05, halfling = 0.10 }
cultural_distance     = { elf = 0.10, dwarf = 0.15, dark_elf = 0.40, orc = 0.35, halfling = 0.10 }
architectural_style    = "timber-framed"
settlement_descriptor  = "town"
biome_adaptations      = [
  "grassland: low walled towns with market squares and dusty lanes",
  "plains: sprawling homesteads connected by packed-earth roads",
  "temperate_forest: timber halls and cleared farmland at forest edges",
  "hills: terraced streets climbing the slope, cellars dug into the hillside",
  "desert: thick-walled mud-brick compounds arranged around a central well",
  "tundra: closely packed longhouses with shared smoke-vents against the cold"
]
improvement_descriptors = [
  "farm: orderly furrows and hedge-rows, tended with seasonal rotation",
  "mine: broad-mouthed adits with cart tracks and timber props",
  "logging_camp: cleared slopes with stacked timber and bark-stripped paths"
]
