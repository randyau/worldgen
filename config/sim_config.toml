# World Engine — Simulation Configuration
# Version: 0.1
#
# This file contains all simulation balance constants.
# Edit values here to tune behavior without recompiling.
# All values have comments explaining what they control.
#
# PROFILES: Create files in config/profiles/ that override specific sections.
# Profile files only need to include the values they override.
#
# RULE: If a number affects simulation behavior or balance, it lives here.
# Structural constants (save format version, enum values) stay in code.

# =============================================================================
# WORLD GENERATION
# =============================================================================

[world_gen]
default_tile_size_km    = 10      # Real-world km per world-scale tile
default_width_km        = 4000    # Default world width (Europe-scale)
default_height_km       = 3000    # Default world height (Europe-scale)
chunk_size              = 16      # Tile grid chunk dimensions (16×16 tiles per chunk)
border_manifest_samples = 64      # Samples per tile edge in border manifests
magic_intensity_scale   = 1.0     # Multiplier on magic intensity peaks (V2 stub)

[world_gen.elevation]
noise_scale             = 0.3     # How much noise varies elevation around tectonic baseline
mountain_threshold      = 0.7     # Elevation above which terrain is classified as mountain
tectonic_intensity      = 0.8     # How dramatic plate collision effects are (0=gentle, 1=extreme)
smoothing_passes        = 3       # Box-blur passes on elevation after normalization.
                                   # Softens fault-line steps so rivers curve naturally. 0=off.

[world_gen.ocean]
default_sea_level       = 0.40    # Fraction of tiles (by elevation rank) that are ocean
erosion_passes          = 2       # Passes to strip thin ridges (≥min_ocean_8neighbors ocean 8-neighbors → ocean)
min_ocean_8neighbors    = 5       # Threshold for erosion: tiles with this many ocean 8-neighbors become ocean
                                   # 5 removes 1-tile-wide and 2-tile-wide protrusions; solid coasts are ≤4

[world_gen.climate]
equator_temperature     = 0.9     # Temperature at equator (0-1 scaled)
pole_temperature        = 0.05    # Temperature at poles (0-1 scaled)
elevation_temp_penalty  = 0.4     # How much elevation reduces temperature
rain_shadow_strength    = 0.7     # How much mountains reduce precipitation on leeward side
monsoon_threshold       = 0.6     # Moisture level above which a region has monsoon season
storm_corridor_latitude = 0.55    # Normalized latitude band where storm corridors form

[world_gen.resources]
iron_density            = 0.08    # Fraction of mountain/hill tiles with iron deposits
copper_density          = 0.04    # Fraction of volcanic-adjacent tiles with copper
tin_density             = 0.015   # Fraction of eligible tiles with tin (rare by design)
precious_metal_density  = 0.005   # Fraction of volcanic tiles with precious metals
rare_resource_density   = 0.003   # Fraction of tiles with rare/magical resources

# =============================================================================
# SIMULATION LOOP
# =============================================================================

[sim_loop]
days_per_season         = 90      # Simulation days in one season (affects Daily/Standard sync)
seasons_per_year        = 4       # Always 4: Spring, Summer, Autumn, Winter

[sim_loop.speed]
slow_ticks_per_second   = 0.5     # Seasonal ticks per real second at Slow speed
normal_ticks_per_second = 1.0     # Seasonal ticks per real second at Normal speed
fast_ticks_per_second   = 10.0    # Seasonal ticks per real second at Fast speed
ultrafast_snapshot_years = 10     # Push UI snapshot every N sim-years in Ultrafast mode

# =============================================================================
# EVENTS AND HISTORY
# =============================================================================

[events]
# Active gate keys (consumed by EventsConfig / EventGate)
minimum_recorded_tier        = 0        # 0=Background, 1=Character, 2=Regional, 3=Headline
recent_event_cache_size      = 500
suppressed_types = ["SettlementGrew", "SettlementShrank", "Negotiated"]  # suppress per-tick noise; Negotiated floods DB before chars ally

# --- Legacy keys below are ignored (IgnoreMissingProperties=true) ---
# Pre-write gate minimums
# Increase these to reduce database size (record less)
# Decrease to record more (use "Background" for development/research mode)
# Values: "Background"=0, "Character"=1, "Regional"=2, "Headline"=3
minimum_tier_to_record       = "Background"    # Start permissive, tighten empirically
minimum_population_impact    = "None"          # Effectively no population gate initially

# Event cache (in-memory ring buffer of recent events)
cache_size                   = 400    # Number of recent events kept in memory
                                       # Used for UI event log and IsFirstOfKind checks

# Pruning: events below Regional tier older than this are eligible for pruning
# Set to 0 to disable pruning (development mode)
retention_years              = 500

# IsFirstOfKind lookback window
first_of_kind_lookback_years = 50    # How far back to check when classifying IsFirstOfKind

[events.population_impact_thresholds]
# Population affected → PopulationImpact tier
# Both absolute count AND regional fraction are checked — either condition triggers the tier
catastrophic_absolute        = 10000  # Absolute population affected
catastrophic_fraction        = 0.25   # Fraction of regional population affected
major_absolute               = 500
major_fraction               = 0.05
moderate_absolute            = 50
moderate_fraction             = 0.01

[events.gate]
# Event types always recorded regardless of other gate settings
# Add to this list for types that should never be filtered
always_record_types = [
    "CharacterBorn",
    "CharacterDied",
    "CivilizationFounded",
    "CivilizationCollapsed",
    "ArtifactCreated",
    "ArtifactDestroyed",
    "ReligionFounded",
    "ReligionExtinct",
    "WarDeclared",
    "WarEnded",
    "GodModeDisasterTriggered",
    "GodModeEntitySpawned",
    "GodModeCharacterCreated",
    "GodModeArtifactPlaced",
    "GodModeCivilizationForced",
]

# Event types always suppressed regardless of other gate settings
# Pure simulation bookkeeping with no narrative value
# Add to this list empirically as you discover noise categories
suppressed_types = [
    "Tier3ResourceTick",
    "SettlementFoodAccounting",
    "PopulationGrowthIncrement",
    "ArmySupplyConsumption",
    "RelationshipDecayTick",
    "CharacterMoved",          # pure locomotion: 77% of all events, zero narrative value
]

# Verb classes to suppress entirely (empty = suppress nothing)
# Add verb classes here if an entire category proves to be noise
suppressed_verb_classes = []

# =============================================================================
# ENVIRONMENTAL SIMULATION
# =============================================================================

[environment]
# Natural disaster base probabilities per seasonal tick per eligible tile
# These are per-tick probabilities — multiply by 4 for annual rate
earthquake_prob         = 0.0002   # Per fault line tile per season
wildfire_prob           = 0.0005   # Per forest tile in dry season
flood_prob              = 0.001    # Per river-adjacent tile in wet season
drought_chance_per_year = 0.02     # Per region per year (not per tile)

# Disaster spread
wildfire_spread_prob    = 0.3      # Probability wildfire spreads to adjacent forest tile per tick
flood_spread_radius     = 3        # Maximum tiles a flood event spreads from origin

# Climate drift
climate_drift_rate      = 0.001    # How fast regional temperature/moisture drifts per year
biome_change_threshold  = 0.15     # How much climate must drift before biome reclassifies

# Resource regeneration rates (fraction of max per year)
forest_regrowth_rate    = 0.05     # Forests regrow at 5% per year after wildfire
soil_recovery_rate      = 0.08     # Soil fertility recovers at 8% per year after drought
fish_recovery_rate      = 0.12     # Fish populations recover at 12% per year

# Sea level change
sea_level_change_rate   = 0.0002   # Maximum sea level change per year (fraction of world height)
sea_level_event_threshold = 0.01   # Sea level change required to trigger a SeaLevelChanged event

# =============================================================================
# CIVILIZATION
# =============================================================================

[civilization]
# Population thresholds for settlement state changes
min_viable_population       = 50      # Below this, settlement is in danger of collapse
collapse_threshold          = 0.15    # Fraction of peak population — triggers Collapsed state
recovery_threshold          = 0.40    # Fraction needed to exit Declining state

# Role pressure — population required before Tier 2 specialists crystallize
# (See also [specialists] section for specialist-specific thresholds)
first_tier2_threshold       = 100     # Population before first Tier 2 role crystallizes
tier2_per_population        = 200     # Roughly one new Tier 2 role per N additional population

# Civilization label application
min_tier1_for_civ_label     = 1       # Minimum Tier 1 leaders
min_tier2_roles_for_civ     = 3       # Minimum distinct Tier 2 roles
min_territory_tiles         = 5       # Minimum controlled tiles

# Civilization lifecycle
ruins_to_myth_years         = 500     # Years before abandoned ruins become Myth state
ruins_proximity_to_active_bonus = 200 # Bonus years before Myth if near active civilization

[civilization.settler_seeding]
global_pop_threshold        = 500     # World population below this triggers spontaneous seeding check
probability_per_century     = 0.15    # 15% chance per century when below threshold
starting_population         = 20      # Initial settler group size

