civ_birth_min_pop         = 30
civ_birth_chance_per_season = 0.02
# Territorial aggression: aggressive founders drain trust from foreign visitors on their settlement tile
territorial_aggression_min    = 0.55  # chars below this aggression don't apply pressure
territorial_trust_drain       = 0.025 # trust lost per tick; ~-0.1 in 1 season → rivalry within a year

# Beast encounters: predatory beasts on the same tile can attack wandering characters
beast_encounter_aggression_min = 0.4  # beasts below this aggression are passive toward characters
beast_encounter_chance         = 0.15 # probability of attack per shared tick (~every 7 ticks)
beast_damage_multiplier        = 0.3  # beast.Strength × this = damage dealt to character

# Wanderlust: travel urgency that builds the longer a character stays in one place
wanderlust_max_ticks            = 8    # full bonus after 2 seasons (half a year) stationary
wanderlust_bonus                = 0.4  # travel score bonus at max wanderlust; ~0.15 base → ~0.55 for free agents
# Role dampeners — multiply wanderlust_bonus; rulers barely wander, members occasionally, free agents fully
wanderlust_founder_multiplier   = 0.15 # settlement founders (kings, rulers) — 15% of base wanderlust
wanderlust_member_multiplier    = 0.5  # civ members with settled jobs — 50% of base wanderlust
# Curiosity scales from this floor (Curiosity=0) up to 1.0 (Curiosity=1)
wanderlust_curiosity_floor      = 0.3  # even the least curious chars have 30% of their role's wanderlust
# Ancestry / cultural passive drains — applied per-tick when different-civ chars share a tile
personality_mismatch_drain_rate = 0.003  # drain × |stability diff| per tick
cultural_distance_drain_rate    = 0.002  # drain × cultural_distance (0–1) per tick
# Tier 2 sub-tuning (appended to [character] section — Tomlyn merges same-section keys)
tier2_per_population        = 10
tier2_max_age_seasons_min   = 60
tier2_max_age_seasons_max   = 120
tier2_crystal_chance        = 0.001
tier2_needs_decay_food      = 0.06
tier2_needs_decay_safety    = 0.04
tier2_needs_decay_belonging = 0.03
tier2_needs_decay_status    = 0.04

