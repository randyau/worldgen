# BEASTS (lifecycle constants — species stats are in config/beasts.toml)
# =============================================================================

[beasts]
starvation_health_loss     = 5     # health points lost per season when FoodNeed < 0.2

# =============================================================================
# CHARACTER (Tier 1 — heroes, rulers — Phase 2.2+)
# =============================================================================

[character]
initial_count             = 14
max_age_seasons_min       = 80
max_age_seasons_max       = 200
max_health                = 100
needs_decay_safety        = 0.05
needs_decay_food          = 0.08
needs_decay_shelter       = 0.04
shelter_comfort_temp_low  = 80    # byte; tile BaseTemperature below this → cold shelter pressure
shelter_comfort_temp_high = 180   # byte; tile BaseTemperature above this → heat shelter pressure
shelter_temperature_scale = 0.8   # max additional decay multiplier at temp extremes (0→low or 255→high)
                                   # At scale=0.8: extreme cold/heat → 1.8× decay; settlement (+0.10) still net-positive
expansion_home_penalty    = 120   # tile score penalty applied to own-civ settlement tiles when character has Expansion goal (pushes them to leave)
expansion_empty_tile_bonus = 80   # tile score bonus for tiles outside every settlement's hinterland when Expansion goal is active
expansion_compactness_radius = 8  # max tile distance from a same-civ settlement that earns the compactness bonus
expansion_compactness_bonus  = 60 # bonus added when an unclaimed tile is near an existing same-civ settlement (encourages blob growth)
max_settlements_per_civ      = 5  # hard cap on local settlements per civ; at 10 sq km/tile civs are city-states, not village networks

# Colonization — separate long-range founding goal
colony_min_distance         = 25   # tiles from nearest same-civ settlement for a tile to be "frontier"
colony_frontier_bonus       = 120  # tile score bonus for candidate tiles in frontier territory
colonize_ambition_threshold = 0.72 # min Ambition to form a Colonize goal (higher than expansion)
max_colonies_per_civ        = 3    # hard cap on live colonies; Colonize goals stop forming once reached
max_cities_per_civ          = 8    # M3: total city cap per civ (settlements + colonies combined); ruler stops delegating once reached
city_founding_ambition_threshold = 0.5  # M3: minimum Ambition for a civ member to be selected as city-founding delegate
shelter_seek_threshold    = 0.35  # below this shelter level, characters prefer terrain with natural cover when choosing where to move
shelter_seek_tile_bonus   = 80    # max tile-score bonus for a perfect-shelter biome (forest/mountain) when shelter-seeking
                                   # scales by desperation: bonus × BiomeShelterScore × (1 - shelter)
needs_decay_belonging     = 0.03
needs_decay_status        = 0.03
needs_decay_purpose       = 0.04
needs_decay_spiritual     = 0.02
# Settlement presence passively restores social/identity needs (per tick while on settlement tile)
belonging_own_settlement_recovery      = 0.03   # own-civ settlement: full community belonging (balances decay)
belonging_foreign_settlement_recovery  = 0.01   # foreign settlement: partial benefit as a stranger
status_own_settlement_recovery         = 0.03   # recognized by civ peers (balances decay)
purpose_own_settlement_recovery        = 0.02   # shared work and goals (rest makes up the rest)
spiritual_settlement_recovery          = 0.01   # any settlement: shared ritual, culture
needs_weight              = 0.5
goals_weight              = 0.3
personality_weight        = 0.2
softmax_temp_min          = 0.5
softmax_temp_max          = 2.0
perception_radius         = 3
health_per_season_heal    = 5
combat_damage_base        = 20
min_fertility_to_settle      = 90   # only genuinely fertile land gets settled; prevents every mediocre tile from being claimed
min_base_moisture_to_settle  = 15     # minimum BaseMoisture (0-255) required to found a settlement; prevents founding in climatically arid tiles
deposit_settle_threshold     = 0.5    # min deposit value to settle despite low fertility
deposit_score_multiplier     = 0.5    # how much deposit value boosts establish score
route_score_multiplier       = 0.3    # how much route-position bonus boosts establish score
# Ruins — founding score penalty for building on a destroyed or abandoned settlement site
ruin_cooldown_years           = 10    # hard block: cannot settle a ruined tile for this many years (deposit override disabled)
ruin_founding_penalty         = 0.4   # score penalty after cooldown expires (0–1); high deposits or fertility can still overcome it
ruin_decay_half_life_years    = 50    # years for the penalty to halve (exponential decay)

# Alliance system
alliance_max_base             = 2     # minimum alliance slots per character
alliance_max_per_sociability  = 3     # +floor(Sociability × this) extra slots; Soc=1.0 → 5 slots total
alliance_trust_floor          = 0.1   # trust below this dissolves the alliance on annual check
alliance_war_trust_drain      = 0.4   # trust drained from aggressor to target's allies on war declaration
enemy_of_ally_trust_drain     = 0.15  # trust drain on C when A allies B who is already allied with C's rival
ally_protect_goal_intensity   = 0.6   # priority of the Protect goal seeded on allies when their ally is attacked
ally_disaster_aid_intensity   = 0.3   # (reserved for future goal seeding; merchant routing handles aid currently)
max_war_duration_years        = 15     # wars end by truce after this many years if not ended sooner by surrender/destruction
max_active_wars               = 2     # hard cap: a civ cannot fight more than this many simultaneous wars
peace_cooldown_years          = 10    # years after a war ends before the same two civs can declare war again
war_exhaustion_years_per_war  = 5     # extra cooldown years per prior war between the same pair (1st=10yr, 2nd=15yr, 3rd=20yr...)
raid_damage_min               = 15    # minimum HP damage to a settlement per raid (was hardcoded 10)
raid_damage_max               = 40    # maximum HP damage to a settlement per raid (was hardcoded 30)
war_conquest_health_threshold = 35    # if target settlement health ≤ this at war expiry → conquest instead of truce
war_surrender_pop_threshold   = 5     # a civ with total population below this sues for peace (surrender)
# Rivalry cap scales with Aggression: max = floor(base + Aggression × per_aggression)
# Aggression=0 → 1 rival max; Aggression=1.0 → 4 rivals max
rivalry_max_base              = 1
rivalry_max_per_aggression    = 3
rivalry_trust_threshold       = -0.4  # trust must fall below this before DeclareRivalry is available; prevents one-encounter rivals
# Bond cap scales with Compassion: max = floor(base + Compassion × per_compassion)
# Compassion=0 → 1 bond max; Compassion=1.0 → 3 bonds max
bond_max_base                 = 1
bond_max_per_compassion       = 2

hinterland_drain_factor          = 0.5   # effective fertility multiplier inside same-civ hinterland (0.5 = half claimed)
base_founding_cooldown_years     = 30    # base cooldown between same-civ settlements; slow organic expansion
min_founding_cooldown_years      = 8     # floor — even large civs can't expand faster than once per 8 years
founding_cooldown_pop_scale      = 3000  # civ pop at which cooldown halves (30y→15y at 3k, →7.5y at 6k)
civ_birth_min_pop            = 20   # lowered from 30; settlements reach this faster with improved farming
civ_birth_chance_per_season = 0.01  # 1% per year at min-pop; keeps character count manageable for performance
# Territorial aggression: aggressive founders drain trust from foreign visitors on their settlement tile
territorial_aggression_min    = 0.55  # chars below this aggression don't apply pressure
territorial_trust_drain       = 0.025 # trust lost per tick; ~-0.1 in 1 season → rivalry within a year

# Beast encounters: predatory beasts on the same tile can attack wandering characters
beast_encounter_aggression_min = 0.3  # beasts below this aggression are passive toward characters
beast_encounter_chance         = 0.15 # probability of attack per shared tick (~every 7 ticks)
beast_damage_multiplier        = 0.3  # beast.Strength × this = damage dealt to character
char_counter_damage_multiplier = 0.4  # c.Skills.Combat × MaxHealth × this = counter-damage dealt to beast per exchange

# Character disease — named characters can catch disease from infected settlements
character_disease_exposure_chance  = 0.10  # annual probability of contracting disease while at an infected settlement
character_disease_health_drain     = 20    # HP drained per year while infected (suppresses natural healing)
character_disease_recovery_chance  = 0.30  # annual natural recovery probability (physician healing can supplement)

# Battle wounds — characters at a raided settlement fight back, and the raider can be wounded
defender_counter_damage_multiplier = 0.25  # defender.Combat × MaxHealth × this = damage dealt to raider
raider_char_damage_multiplier      = 0.20  # raider.Combat × MaxHealth × this = damage dealt to defending character

# Wildlife defense — characters present at a settlement during a wildlife raid are wounded and defend
wildlife_char_injury_fraction   = 0.12  # fraction of MaxHealth lost when a character is present at a wildlife raid
wildlife_char_defense_reduction = 0.40  # defender.Combat scales this; reduces population damage fraction (max reduction = this value)

# Wanderlust: travel urgency that builds the longer a character stays in one place
wanderlust_max_ticks            = 8    # full bonus after 2 seasons (half a year) stationary
wanderlust_bonus                = 0.4  # travel score bonus at max wanderlust; ~0.15 base → ~0.55 for free agents
# Role dampeners — multiply wanderlust_bonus; rulers barely wander, members occasionally, free agents fully
wanderlust_founder_multiplier   = 0.15 # settlement founders (kings, rulers) — 15% of base wanderlust
wanderlust_member_multiplier    = 0.8  # civ members — 70% of base wanderlust (was 0.5; raised to encourage expansion)
# Curiosity scales from this floor (Curiosity=0) up to 1.0 (Curiosity=1)
wanderlust_curiosity_floor      = 0.3  # even the least curious chars have 30% of their role's wanderlust
# Ancestry / cultural passive drains — applied per-tick when different-civ chars share a tile
personality_mismatch_drain_rate = 0.003  # drain × |stability diff| per tick
cultural_distance_drain_rate    = 0.002  # drain × cultural_distance (0–1) per tick
# Goal formation — personality trait thresholds below which a character won't form that goal type
goal_ambition_threshold      = 0.55  # minimum Ambition to generate Expansion goal
goal_aggression_threshold    = 0.6   # minimum Aggression to generate Dominance goal
goal_sociability_threshold   = 0.5   # minimum Sociability to generate Alliance goal
goal_compassion_threshold    = 0.5   # minimum Compassion to generate Bond goal
goal_ingenuity_threshold     = 0.55  # minimum Ingenuity to generate Create goal
goal_diligence_threshold     = 0.45  # minimum Diligence to generate BuildImprovement goal
avenge_aggression_threshold  = 0.6   # minimum Aggression to form Avenge goal on mourning
avenge_intensity_threshold   = 0.5   # minimum grief intensity required to form Avenge goal
bond_trust_threshold         = 0.5   # minimum relationship Trust before a character qualifies as Bond companion
goal_stale_season_limit      = 8     # seasons (2 years) without progress before a non-Grieve goal is pruned
rival_search_radius          = 5     # tile radius when scanning for nearby rivals (Dominance goal)
alliance_search_radius       = 4     # tile radius when scanning for nearby neutrals (Alliance goal)
bond_search_radius           = 3     # tile radius when scanning for Bond companions
war_aggression_threshold     = 0.5   # minimum Aggression to consider DeclareWar action

# Civilisation floor — prevents the world from converging to one or zero civs
# If active (non-collapsed) civ count drops below civ_floor_count, the annual pass
# rolls to spawn a new free-agent founder on unclaimed fertile land.
civ_floor_count        = 5     # minimum active civs; floor kicks in below this
civ_floor_spawn_chance = 0.3   # annual probability per missing civ slot to spawn a founder
civ_floor_min_dist     = 20    # minimum tile distance from existing settlements for the spawn tile

# Succession crisis — when the founding ruler dies, distant settlements enter instability
succession_crisis_years      = 10    # how long the crisis lasts after founder death
succession_crisis_decay_mult = 2.5   # decay rate multiplier for settlements beyond stable radius during crisis
succession_stable_radius     = 15    # tile radius from capital immune to succession instability

# Border tension — civ-level territorial pressure that triggers war without ruler proximity
war_proximity_radius        = 15    # tile radius within which settlements build tension toward each other
tension_accrual_per_pair    = 0.12  # tension added per close settlement pair per year (× proximity factor × ruler Aggression)
tension_decay_rate          = 0.15  # fraction of tension lost each year when no proximate settlements exist
tension_war_threshold       = 1.0   # accumulated tension at which war is declared (if ruler Aggression ≥ war_aggression_threshold)

# Wellbeing — emotional state dynamics (-1 spiraling … +1 flourishing)
wellbeing_goal_gain_rate        = 0.01    # per tick when a goal is progressing
wellbeing_companion_boost       = 0.005   # per tick co-located with Bond target
wellbeing_hunger_drain          = 0.02    # max drain at zero food
wellbeing_hunger_threshold      = 0.3     # food need below this triggers hunger wellbeing drain
wellbeing_mean_reversion_rate   = 0.008   # pull toward 0 each tick (raised from 0.005 — prevents permanent distress equilibrium)
flourishing_threshold           = 0.7     # Wellbeing ≥ this → Flourishing event fires once
spiral_threshold                = -0.7    # Wellbeing ≤ this → Spiraling
distressed_social_suppression   = 0.4     # social action score multiplier when Wellbeing < -0.3
grief_drain_rate                = 0.015   # Wellbeing drain per tick per Grieve goal
grief_decay_rate                = 0.004   # grief intensity decay per tick (raised from 0.002 — was ~31yr grief period, now ~15yr)
grief_wellbeing_shock           = 0.4     # fraction of grief intensity applied as immediate Wellbeing shock on mourning
grief_completion_threshold      = 0.05    # grief Intensity below this → grief goal auto-completes (grief resolved)
# Wellbeing drain multipliers for specific goal types (fraction of wellbeing_goal_gain_rate)
wellbeing_endure_multiplier     = 0.5     # Endure: slow draining perseverance
wellbeing_survive_multiplier    = 0.3     # Survive: urgent pressure but lower emotional weight
wellbeing_flee_multiplier       = 0.4     # Flee: flight-or-fight stress
wellbeing_stagnation_threshold_ticks = 80  # ticks (~1 season at 16/year) before inactive goal drains wellbeing
wellbeing_stagnation_drain_rate = 0.002    # per tick for goals stuck without progress
wellbeing_purpose_drought_drain = 0.003    # per tick when character has no flourishing goals (Create/Bond/FoundCity)

# Tier 2 sub-tuning (appended to [character] section — Tomlyn merges same-section keys)
tier2_per_population        = 10
tier2_max_age_seasons_min   = 600   # ~38 years at 16 ticks/year (was 60 — 4 years, broken)
tier2_max_age_seasons_max   = 1200  # ~75 years (was 120 — also broken)
tier2_crystal_chance        = 0.001
tier2_needs_decay_food      = 0.06
tier2_needs_decay_safety    = 0.04
tier2_needs_decay_belonging = 0.03
tier2_needs_decay_status    = 0.04

# Scholar discovery settings
scholar_discovery_chance       = 0.04  # per-tick chance = this × Rationality
scholar_discovery_bonus_amount = 0.05  # bonus added to settlement ResourceStore key per discovery

# Physician settlement healing
physician_settlement_heal_rate = 0.5   # health restored per tick to infected settlement = this × Rationality

# Tier2 creator event pacing
# Most work happens silently; these control when it becomes a history-log event.
tier2_notable_cooldown_ticks  = 64     # minimum ticks between notable events per character (4 years)
tier2_exceptional_work_chance = 0.001  # per-tick chance of exceptional work during a notable event (~1 per lifetime)

# Tier1 Create goal cooldown
create_goal_cooldown_ticks = 80        # ticks after completing a Create goal before a new one can form (5 years)

# =============================================================================
# SETTLEMENT (Phase 2.4 — Population Dynamics)
# =============================================================================

[settlement]
pop_growth_rate             = 0.5   # population added per season per fertility unit (fertility/255 × this)
                                    # Lower is intentional: fast growth causes Malthusian starvation with no surplus for stores
pop_decay_rate              = 0.05  # population lost per season unconditionally (hunger/disease baseline)
starvation_decay_rate       = 0.3   # extra decay per unit food deficit when food < shortage_threshold
famine_decay_rate           = 0.8   # extra decay per unit food deficit when food < crisis_threshold
pop_min_viable              = 5     # below this → settlement abandoned
pop_max                     = 8000  # hard cap; at 10 sq km/tile a single settlement over 8k is already a major city
fertility_variance          = 0.15  # per-settlement founding-time multiplier range (±this around 1.0)

# Biome carrying capacity: population supported per reach tile, by biome type.
# Sums across all land tiles in the settlement's reach to compute a soft population ceiling.
# Logistic suppression makes growth decelerate as population approaches this ceiling.
carry_cap_grassland           = 80   # ~20-25 people/sq km in pre-industrial farmland; radius-2 hinterland → ~1000 cap
carry_cap_plains              = 65
carry_cap_tropical_rainforest = 70
carry_cap_savanna             = 32
carry_cap_temperate_forest    = 48
carry_cap_boreal_forest       = 20
carry_cap_swamp               = 24
carry_cap_beach               = 16
carry_cap_mountain            = 12
carry_cap_high_mountain       = 4
carry_cap_desert              = 6
carry_cap_volcanic            = 20
carry_cap_default             = 24
carry_cap_minimum             = 20  # floor: even the poorest biome supports a small community

# Disease outbreaks — annual probability; spreads between nearby settlements; drains population while active
# Risk concentrates in dense cities; small remote settlements are largely immune.
disease_base_chance          = 0.01   # ~1 outbreak per 150 years per average settlement (was 0.02 — too frequent)
disease_density_mult         = 3.0    # large dense cities still vulnerable: ~1.2% at pop cap
disease_mortality_per_year   = 0.05   # meaningful but not instantly lethal
disease_min_pop              = 30     # outbreaks cannot start below this population
disease_spread_radius        = 12     # tile radius within which disease can spread annually
disease_spread_chance        = 0.08   # reduced from 0.20 — disease is regional, not instantly global
disease_max_duration_years   = 8      # infection auto-clears after this many years
disease_recovery_chance      = 0.30   # natural recovery probability per year

# Settlement health recovery — passive repair between raids
# At 1 HP/tick and 16 ticks/year, a fully destroyed settlement (0 HP) recovers to 100 in ~6 years.
health_recovery_per_tick = 1    # HP regained per tick; raids deal 10–30 HP so recovery takes weeks to months
max_health               = 100  # maximum settlement health

# Wildlife raids — annual attacks scaled by biome danger and settlement size
# Open biomes (plains, savanna, desert) have lower risk; dense cover (forest, jungle, swamp) is higher.
# See BiomeWildlifeRisk() in PopulationDynamicsPhase.cs for per-biome multipliers.
wildlife_attack_base_chance  = 0.05   # reduced from 0.08; biome multiplier then adjusts (0.3x–2.0x)
wildlife_attack_damage       = 0.08   # reduced from 0.10
wildlife_defense_pop_scale   = 300    # settlements at this population have 80% reduced vulnerability

# Emigration — pressure-driven colonization triggered when settlements exceed carrying capacity
emigration_threshold         = 0.75   # fraction of carrying cap above which emigration activates
emigration_bonus_chance      = 0.08   # additional annual spawn probability when over threshold (scaled by pressure)
emigrant_pop_cost            = 20     # population deducted from parent settlement per emigrant spawned

crystal_pop_artisan         = 200
crystal_pop_scholar         = 300
crystal_pop_physician       = 500
crystal_pop_merchant        = 1000

[resource_pressure]
shortage_threshold      = 0.6    # food ratio below this = shortage; seeds Acquire goals
crisis_threshold        = 0.3    # food ratio below this = crisis; also seeds Flee goals
acquire_goal_intensity  = 0.7
flee_goal_intensity     = 0.5
strain_event_cooldown   = 8      # ticks between SettlementStraining events per settlement
population_cap_per_tile = 100.0  # pop count that equals "full demand" for one tile's food
food_moisture_floor     = 0.25   # fraction of base moisture always assumed available for food (wells, root storage, irrigation); prevents winter moisture crashes from zeroing food supply
# Growing-season temperature factor (multiplies food contribution per hinterland tile)
# Piecewise linear: 0 at frost threshold → ramp to 1.0 at optimal_low → flat 1.0 to optimal_high → ramp to heat_stress_factor at 255
frost_temperature_threshold = 45   # effective temp (byte) below which crops don't grow; ~polar/high-alpine
optimal_temperature_low     = 100  # lower bound of peak growing band; below this food scales up from 0
optimal_temperature_high    = 200  # upper bound of peak growing band; above this heat stress begins
heat_stress_factor          = 0.7  # multiplier at extreme heat (255); tropical-desert crops still viable but stressed

# Resource stores — settlements accumulate persistent reserves for all resources
# Vital resources (food, water) draw from stores during shortages; wealth/stockpile resources just accumulate.
biome_food_bonus_scale             = 1.0    # 0=all biomes equal, 1.0=full biome differentiation (grassland 2x, desert 0.3x)
store_accumulate_rate              = 0.6     # fraction of per-tick surplus that goes into stores (vital resources)
store_max_seasons_per_k_pop        = 4.0    # max vital store depth in seasons per 1000 population
store_min_seasons                  = 2.0    # hard floor on vital store capacity; small settlements buffer 2 seasons
# Per-resource spoilage rates (fraction lost per tick regardless of draws)
food_spoilage_rate                 = 0.002  # ~500 ticks (35y) to fully spoil if never drawn
water_spoilage_rate                = 0.010  # cisterns evaporate faster; settlements need continuous rainfall
wealth_spoilage_rate               = 0.0001 # gold/gems essentially permanent
stockpile_spoilage_rate            = 0.0005 # iron/copper/timber decay slowly
wealth_accumulate_rate             = 0.2    # fraction of non-vital ledger supply that banks into stores per tick
store_raid_destruction_per_damage  = 0.008  # fraction of ALL stores destroyed per point of raid damage

# =============================================================================
# TERRITORY (Phase 3.0 — City-State Territory Model)
# =============================================================================

[territory]
claim_tiles_per_person    = 8    # 1 tile per N people; city of 800 → 100 tiles (~radius 5)
min_city_tiles            = 7    # radius-1 circle, always retained
max_city_tiles            = 120  # ~radius-6; absolute upper bound
territory_growth_per_year = 2    # max tiles claimed per city per year (prevents instant snowball)
initial_city_claim_radius = 2    # tiles claimed at founding (~13 tiles)

# =============================================================================
# IMPROVEMENTS (Phase 3.0 — Tile Improvements)
# =============================================================================

[improvements]
farm_food_multiplier      = 2.0  # Farm on tile: food contribution × this
mine_yield_multiplier     = 3.0  # Mine on tile: mineral yield × this
logging_yield_multiplier  = 2.5  # LoggingCamp: timber × this
pasture_multiplier        = 1.5  # Pasture (grassland/savanna only): food × this
fishery_multiplier        = 2.0  # Fishery (coastal/river only): food × this
improvement_build_ticks   = 8    # ticks character must remain on tile to build (= half a year)

[settlement_names]
prefixes = [
    "Iron", "Stone", "Green", "Dark", "Swift", "High", "Old", "Black", "White",
    "Red", "Cold", "Bright", "Fair", "Lone", "Ash", "Ember", "Frost", "Gold",
    "Mist", "Reed", "Crag", "Deep", "Tall", "Hard", "Flint", "Silver", "Amber",
    "Hollow", "Sharp", "Broad"
]
suffixes = [
    "ford", "hold", "wick", "vale", "mere", "fell", "gate", "haven",
    "reach", "moor", "cliff", "pass", "watch", "crest", "grove", "hollow",
    "peak", "ridge", "bridge", "mill", "shore", "keep", "mark", "lea"
]

[cultural_traits]
# Militaristic: civ must have initiated this many total wars
militaristic_min_wars         = 10
# AND average more than this many wars per decade
militaristic_wars_per_decade  = 2.0

# Expansionist: civ must average > this many settlement foundings per 10 years
expansionist_founding_rate    = 1.0
# ...sustained over at least this many years
expansionist_sustained_years  = 30

# WarWeary: any single enemy must appear in war history this many times
war_weary_min_repeat_wars     = 3

# Resilient: civ must have survived this many near-collapse episodes
resilient_min_near_collapse_count     = 1
# Near-collapse = total population dropped below this threshold
resilient_near_collapse_pop_threshold = 20

# Scholarly: civ members must have made this many total scholar discoveries
scholarly_min_discoveries     = 5

# UnstableThrone: this many successions in the rolling window qualifies
unstable_throne_min_successions = 5
# Rolling window size in years
unstable_throne_years           = 50

# =============================================================================
# EMISSARY SYSTEM (M4 Phase 1 — Civ Awareness & Emissary)
# =============================================================================

[emissary]
# Knowledge propagation
knowledge_spread_radius         = 30    # tiles; civs within this range gain Rumor contact (vs WarProximityRadius ~8)
rumor_confidence_gain           = 0.15  # confidence added per year of proximity rumor
encounter_confidence_gain       = 0.35  # confidence added on character cross-civ encounter
confidence_decay_per_year       = 0.05  # lost per year without contact
rumor_chain_probability         = 0.05  # annual chance Civ A passes knowledge of Civ C to Civ B (per pair)
rumor_chain_confidence_factor   = 0.5   # chained rumors arrive at fraction of source confidence

# Emissary dispatch
dispatch_check_years            = 5     # ruler considers dispatching per this many years
max_active_emissaries_per_civ   = 3     # cap on simultaneous in-transit emissaries
emissary_travel_speed_tiles_per_year = 8.0  # how fast emissaries travel; affects delay and mortality
trade_dispatch_min_trust        = -0.1  # min character trust to send trade emissary
diplomacy_dispatch_min_trust    = 0.1   # min trust for diplomatic mission
spy_dispatch_max_trust          = 0.2   # spy missions target civs you don't trust well

# Emissary mortality
emissary_death_per_tile         = 0.008  # cumulative per-tile mortality rate
emissary_min_survival_chance    = 0.2    # floor: even a 200-tile journey has 20% success
                                         # effective formula: clamp(1 - dist * death_per_tile, min_survival, 1.0)

# Emissary outcomes (on arrival)
trade_trust_gain                = 0.08
trade_min_pop_for_goods         = 50     # both civs need this pop to meaningfully trade
diplomacy_alliance_min_trust    = 0.25   # trust required after emissary to trigger AllianceFormed
spy_confidence_boost            = 0.4    # how much the contact confidence improves from spy intel
religious_spread_awe_boost      = 0.3    # awe modifier added to target-civ chars on religious emissary
