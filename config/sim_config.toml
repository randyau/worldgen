[settlement]
pop_growth_rate          = 2.0   # population added per season per fertility unit (fertility/255 × this)
pop_decay_rate           = 0.05  # population lost per season unconditionally (hunger/disease stub)
pop_min_viable           = 5     # below this → settlement abandoned
pop_max                  = 50000 # hard cap
crystal_pop_artisan      = 200
crystal_pop_scholar      = 300
